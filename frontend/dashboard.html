<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Market Databank</title>
  <meta name="description" content="Your personal dashboard on Market Databank — manage uploaded datasets, track downloads and likes." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="navbar-brand"><div class="logo-icon">📊</div><span>Market Databank</span></a>
    <div class="navbar-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/upload.html" id="nav-upload" class="nav-link" style="display:none">Upload</a>
      <a href="/dashboard.html" id="nav-dash" class="nav-link active" style="display:none">Dashboard</a>
      <a href="/login.html" id="nav-login" class="nav-link" style="display:none">Login</a>
    </div>
    <div class="navbar-user">
      <span id="nav-username"></span>
      <button id="nav-logout" class="btn btn-secondary btn-sm" style="display:none">Logout</button>
    </div>
  </div>
</nav>

<main class="page">
  <div class="container">

    <!-- Profile header -->
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:32px; flex-wrap:wrap;">
      <div style="width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:800;" id="avatar-circle">?</div>
      <div>
        <h1 id="dash-name" style="font-size:1.6rem; font-weight:800; letter-spacing:-0.5px;">Loading…</h1>
        <p id="dash-email" style="color:var(--text-muted); font-size:0.875rem;"></p>
        <span id="dash-role" class="badge" style="margin-top:6px;"></span>
      </div>
      <a href="/upload.html" class="btn btn-primary" style="margin-left:auto;">📤 Upload New Dataset</a>
    </div>

    <!-- Stats -->
    <div class="stats-row" style="margin-bottom:32px;">
      <div class="stat-card">
        <div class="stat-value" id="dash-total">0</div>
        <div class="stat-label">Datasets Uploaded</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="dash-downloads">0</div>
        <div class="stat-label">Total Downloads</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="dash-likes">0</div>
        <div class="stat-label">Total Likes</div>
      </div>
    </div>

    <!-- Admin: Pending Approval Requests -->
    <div class="card" id="pending-section" style="margin-bottom:28px; border-color:rgba(245,158,11,0.3); display:none;">
      <div class="card-header">
        <h2 class="card-title" style="display:flex;align-items:center;gap:10px;">
          🕐 Pending Approval Requests
          <span id="pending-badge" style="
            display:none; background:linear-gradient(135deg,#f59e0b,#ef4444);
            color:#fff; font-size:0.72rem; font-weight:800;
            padding:2px 10px; border-radius:20px; min-width:22px; text-align:center;
          ">0</span>
        </h2>
        <span style="font-size:0.8rem;color:var(--text-muted);">Review and approve user-submitted datasets</span>
      </div>
      <div id="pending-container">
        <div class="loading-wrap"><div class="spinner"></div><p>Loading requests…</p></div>
      </div>
    </div>

    <!-- Datasets table -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">📂 My Datasets</h2>
      </div>
      <div id="dash-table-container">
        <div class="loading-wrap"><div class="spinner"></div><p>Loading…</p></div>
      </div>
    </div>

  </div>
</main>

<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
